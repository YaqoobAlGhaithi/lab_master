Entername: DeepSeek Code Generator

on:
  workflow_dispatch:
    inputs:
      prompt:
        description: 'ماذا تريد من ديب سيك أن يكتب؟ (مثال: سكريبت بايثون لسحب البيانات)'
        required: true
      file_path:
        description: 'مسار واسم الملف المراد إنشاؤه أو تعديله (مثال: src/utils.py)'
        required: true
        default: 'generated_code.py'

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write # للسماح برفع الكود للمستودع

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install requests

      - name: Generate Code via DeepSeek
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          PROMPT: ${{ github.event.inputs.prompt }}
          FILE_PATH: ${{ github.event.inputs.file_path }}
        run: |
          python -c "
          import os
          import requests

          api_key = os.environ['DEEPSEEK_API_KEY']
          prompt = os.environ['PROMPT']
          file_path = os.environ['FILE_PATH']

          headers = {
              'Authorization': f'Bearer {api_key}',
              'Content-Type': 'application/json'
          }

          # توجيه ديب سيك لإنتاج كود برمي نقي فقط بدون نصوص جانبية
          system_message = 'You are an expert software engineer. Output ONLY the raw executable code for the requested file. Do not include markdown formatting like \`\`\`python, explanations, or introductory text. Just the code.'

          data = {
              'model': 'deepseek-chat',
              'messages': [
                  {'role': 'system', 'content': system_message},
                  {'role': 'user', 'content': prompt}
              ],
              'temperature': 0.2
          }

          response = requests.post('https://api.deepseek.com/v1/chat/completions', headers=headers, json=data)
          result = response.json()

          try:
              code_content = result['choices'][0]['message']['content'].strip()
              
              # تنظيف الكود في حال أضاف الموديل وسوم الماركداون بالخطأ
              if code_content.startswith('\`\`\`'):
                  lines = code_content.splitlines()
                  if lines[0].startswith('\`\`\`'): lines = lines[1:]
                  if lines[-1].startswith('\`\`\`'): lines = lines[:-1]
                  code_content = '\n'.join(lines)

              # إنشاء المجلدات إن لم تكن موجودة
              if os.path.dirname(file_path):
                  os.makedirs(os.path.dirname(file_path), exist_ok=True)

              with open(file_path, 'w', encoding='utf-8') as f:
                  f.write(code_content)
              print('Successfully generated the code file.')
          except Exception as e:
              print('Error generating code:', result)
              raise e
          "

      - name: Commit and Push to Repository
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add "${{ github.event.inputs.file_path }}"
          git commit -m "🤖 كود مالي تلقائي بواسطة DeepSeek: ${{ github.event.inputs.file_path }}"
          git push
