herename: DeepSeek Code Reviewer

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install requests

      - name: Get PR Diff and Review with DeepSeek
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          python -c "
          import os
          import requests
          import subprocess

          # 1. الحصول على الفروقات (Diff) في الكود
          try:
              base_ref = os.environ['github_base_ref', 'main']
              subprocess.run(['git', 'fetch', 'origin', base_ref])
              diff = subprocess.check_output(['git', 'diff', f'origin/{base_ref}...HEAD']).decode('utf-8')
          except Exception as e:
              print(f'Error getting diff: {e}')
              exit(0)

          if not diff.strip():
              print('No changes found to review.')
              exit(0)

          # 2. إرسال الكود إلى DeepSeek API
          headers = {
              'Authorization': f'Bearer {os.environ[\"DEEPSEEK_API_KEY\"]}',
              'Content-Type': 'application/json'
          }
          
          prompt = f\"You are an expert code reviewer. Review the following git diff. Identify bugs, security issues, and suggest performance optimizations. Be concise and write your response in Arabic or English depending on context.\\n\\n{diff}\"
          
          data = {
              'model': 'deepseek-chat', # يمكنك استخدام deepseek-reasoner للمراجعات العميقة
              'messages': [{'role': 'user', 'content': prompt}],
              'temperature': 0.2
          }
          
          response = requests.post('https://api.deepseek.com/v1/chat/completions', headers=headers, json=data)
          review_text = response.json()['choices'][0]['message']['content']

          # 3. كتابة المراجعة كتعليق على الـ Pull Request في GitHub
          github_headers = {
              'Authorization': f'token {os.environ[\"GITHUB_TOKEN\"]}',
              'Accept': 'application/vnd.github.v3+json'
          }
          
          comment_data = {'body': f\"### 🤖 مراجعة تلقائية بواسطة DeepSeek:\\n\\n{review_text}\"}
          repo = os.environ['REPO']
          pr_number = os.environ['PR_NUMBER']
          
          comment_url = f'https://api.github.com/repos/{repo}/issues/{pr_number}/comments'
          requests.post(comment_url, headers=github_headers, json=comment_data)
          print('Review posted successfully!')
          "
